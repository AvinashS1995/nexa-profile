<div class="min-h-screen bg-white">
  <nav class="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-md border-b border-slate-200 shadow-sm">
    <div class="container mx-auto px-4">
      <div class="flex items-center justify-between h-16">
        <button
          type="button"
          class="flex items-center gap-3 text-xl font-bold bg-gradient-to-r from-orange-500 to-orange-600 bg-clip-text text-transparent hover:from-orange-600 hover:to-orange-700 transition-all"
          (click)="scrollToSection('home')"
        >
          <img src="assets/nexa-profile-logo.png" alt="NexaProfile logo" class="w-8 h-8 object-contain" />
          NexaProfile
        </button>

        <div class="hidden md:flex items-center gap-1">
          <button
            *ngFor="let item of navItems"
            type="button"
            (click)="scrollToSection(item.id)"
            class="px-4 py-2 rounded-lg text-sm transition-all flex items-center gap-2"
            [ngClass]="{
              'bg-orange-500 text-white': activeSection === item.id,
              'text-slate-600 hover:text-orange-500 hover:bg-orange-50': activeSection !== item.id
            }"
          >
            <i class="{{ item.icon }}"></i>
            {{ item.label }}
          </button>
        </div>

        <button
          type="button"
          class="md:hidden p-2 rounded-lg hover:bg-slate-100 transition-colors"
          (click)="toggleMobileMenu()"
          aria-label="Toggle navigation"
        >
          <i class="fa-solid" [ngClass]="isMobileMenuOpen ? 'fa-xmark' : 'fa-bars'"></i>
        </button>
      </div>

      <div *ngIf="isMobileMenuOpen" class="md:hidden py-4 border-t border-slate-200">
        <div class="flex flex-col gap-2">
          <button
            *ngFor="let item of navItems"
            type="button"
            (click)="scrollToSection(item.id)"
            class="flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-all"
            [ngClass]="{
              'bg-orange-500 text-white': activeSection === item.id,
              'text-slate-600 hover:bg-orange-50 hover:text-orange-500': activeSection !== item.id
            }"
          >
            <i class="{{ item.icon }}"></i>
            {{ item.label }}
          </button>
        </div>
      </div>
    </div>
  </nav>

  <div class="pt-16">
    <app-hero-section [data]="portfolio.home"></app-hero-section>
    <app-about-section [data]="portfolio.about"></app-about-section>
    <app-skills-section *ngIf="portfolio.skills.length" [data]="portfolio.skills"></app-skills-section>
    <app-experience-section *ngIf="portfolio.experience.length" [data]="portfolio.experience"></app-experience-section>
    <app-education-section *ngIf="portfolio.education.length" [data]="portfolio.education"></app-education-section>
    <app-projects-section *ngIf="portfolio.projects.length" [data]="portfolio.projects"></app-projects-section>
    <app-services-section *ngIf="portfolio.services.length" [data]="portfolio.services"></app-services-section>
    <app-contact-section [data]="portfolio.contactInfo"></app-contact-section>
  </div>

  <button
    *ngIf="showScrollTop"
    type="button"
    (click)="scrollToTop()"
    class="fixed bottom-8 right-8 p-3 rounded-full bg-orange-500 text-white shadow-lg hover:bg-orange-600 transition-all hover:scale-110 z-40"
    aria-label="Scroll to top"
  >
    <i class="fa-solid fa-chevron-up text-lg"></i>
  </button>

  <footer class="bg-slate-900 text-white py-8">
    <div class="container mx-auto px-4 text-center">
      <p class="text-slate-400">
        © {{ portfolio.appName }} {{ currentYear }}. All rights reserved.
      </p>
      <p class="text-slate-500 text-sm mt-2">Crafted with passion and precision.</p>
    </div>
  </footer>
</div>
