<section id="contact" class="py-20 px-4 bg-white">
  <div class="container mx-auto max-w-6xl">
    <div class="text-center mb-16">
      <h2 class="text-4xl md:text-5xl mb-4 font-bold">Get In Touch</h2>
      <div class="w-20 h-1 bg-orange-500 mx-auto"></div>
    </div>

    <div class="grid md:grid-cols-5 gap-12">
      <div class="md:col-span-2 space-y-6">
        <div>
          <h3 class="text-2xl mb-6 font-semibold">Contact Information</h3>
          <p class="text-slate-600 mb-8">
            Feel free to reach out for collaborations or just a friendly hello!
          </p>
        </div>

        <div class="space-y-4">
          <div *ngIf="data.email" class="flex items-start gap-4">
            <div class="w-12 h-12 rounded-lg bg-orange-100 flex items-center justify-center">
              <i class="fa-solid fa-envelope text-orange-500"></i>
            </div>
            <div>
              <p class="text-sm text-slate-600 mb-1">Email</p>
              <a class="hover:text-orange-500 transition-colors" href="mailto:{{ data.email }}">{{ data.email }}</a>
            </div>
          </div>

          <div *ngIf="data.phone" class="flex items-start gap-4">
            <div class="w-12 h-12 rounded-lg bg-orange-100 flex items-center justify-center">
              <i class="fa-solid fa-phone text-orange-500"></i>
            </div>
            <div>
              <p class="text-sm text-slate-600 mb-1">Phone</p>
              <a class="hover:text-orange-500 transition-colors" href="tel:{{ data.phone }}">{{ data.phone }}</a>
            </div>
          </div>

          <div *ngIf="data.location" class="flex items-start gap-4">
            <div class="w-12 h-12 rounded-lg bg-orange-100 flex items-center justify-center">
              <i class="fa-solid fa-map-pin text-orange-500"></i>
            </div>
            <div>
              <p class="text-sm text-slate-600 mb-1">Location</p>
              <p>{{ data.location.city }}, {{ data.location.country }}</p>
              <p class="text-sm text-slate-600">{{ data.location.company }}</p>
            </div>
          </div>
        </div>

        <div *ngIf="data.socialMedia" class="pt-6">
          <p class="text-sm text-slate-600 mb-4">Follow Me</p>
          <div class="flex gap-3">
            <a
              *ngIf="data.socialMedia.linkedin"
              [href]="data.socialMedia.linkedin"
              target="_blank"
              rel="noopener noreferrer"
              class="w-10 h-10 rounded-lg bg-slate-100 hover:bg-orange-100 flex items-center justify-center transition-colors"
            >
              <i class="fa-brands fa-linkedin text-orange-500"></i>
            </a>
            <a
              *ngIf="data.socialMedia.github"
              [href]="data.socialMedia.github"
              target="_blank"
              rel="noopener noreferrer"
              class="w-10 h-10 rounded-lg bg-slate-100 hover:bg-orange-100 flex items-center justify-center transition-colors"
            >
              <i class="fa-brands fa-github text-orange-500"></i>
            </a>
            <a
              *ngIf="data.socialMedia.twitter"
              [href]="data.socialMedia.twitter"
              target="_blank"
              rel="noopener noreferrer"
              class="w-10 h-10 rounded-lg bg-slate-100 hover:bg-orange-100 flex items-center justify-center transition-colors"
            >
              <i class="fa-brands fa-twitter text-orange-500"></i>
            </a>
          </div>
        </div>
      </div>

      <div class="md:col-span-3">
        <form #contactForm="ngForm" (ngSubmit)="handleSubmit(contactForm)" class="space-y-6 bg-slate-50 p-8 rounded-xl">
          <div *ngIf="successMessage" class="text-sm text-green-600 bg-green-50 p-3 rounded-md border border-green-200">
            {{ successMessage }}
          </div>

          <div class="grid md:grid-cols-2 gap-6">
            <div class="space-y-2">
              <label class="text-sm font-medium" for="name">Name</label>
              <input
                id="name"
                name="name"
                [(ngModel)]="formData.name"
                required
                class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:border-orange-500 focus:outline-none"
                type="text"
              />
            </div>

            <div class="space-y-2">
              <label class="text-sm font-medium" for="email">Email</label>
              <input
                id="email"
                name="email"
                type="email"
                [(ngModel)]="formData.email"
                required
                class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:border-orange-500 focus:outline-none"
              />
            </div>
          </div>

          <div class="space-y-2">
            <label class="text-sm font-medium" for="subject">Subject</label>
            <input
              id="subject"
              name="subject"
              [(ngModel)]="formData.subject"
              required
              class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:border-orange-500 focus:outline-none"
              type="text"
            />
          </div>

          <div class="space-y-2">
            <label class="text-sm font-medium" for="message">Message</label>
            <textarea
              id="message"
              name="message"
              rows="6"
              [(ngModel)]="formData.message"
              required
              class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:border-orange-500 focus:outline-none"
            ></textarea>
          </div>

          <button
            type="submit"
            class="w-full px-6 py-3 rounded-full bg-orange-500 text-white font-semibold hover:bg-orange-600 transition-all flex items-center justify-center gap-2"
          >
            <i class="fa-solid fa-paper-plane"></i>
            Send Message
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
