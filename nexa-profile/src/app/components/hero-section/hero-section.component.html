<section id="home" class="min-h-screen relative overflow-hidden bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-white px-4 py-20">
  <div class="container mx-auto max-w-4xl text-center">
    <div class="mb-8">
      <div
        class="w-32 h-32 rounded-full bg-gradient-to-br from-orange-400 to-orange-600 mx-auto mb-6 shadow-2xl border-4 border-white/10 flex items-center justify-center text-5xl font-bold"
      >
        {{ initialLetter }}
      </div>
    </div>

    <h1 class="text-5xl md:text-7xl font-bold mb-6">{{ data.name }}</h1>

    <div class="flex flex-wrap justify-center gap-3 mb-8">
      <span
        *ngFor="let role of data.roles"
        class="px-4 py-2 bg-white/10 backdrop-blur-sm rounded-full border border-white/20 text-sm hover:bg-white/20 transition-colors"
      >
        {{ role }}
      </span>
    </div>

    <p class="text-xl text-slate-300 mb-12 max-w-2xl mx-auto leading-relaxed">
      {{ data.description }}
    </p>

    <div class="flex flex-wrap justify-center gap-4 mb-12">
      <a
        href="#contact"
        class="px-8 py-3 bg-orange-500 hover:bg-orange-600 rounded-full transition-all hover:scale-105 shadow-lg hover:shadow-orange-500/50"
      >
        Get in Touch
      </a>

      <a
        href="#projects"
        class="px-8 py-3 bg-white/10 hover:bg-white/20 backdrop-blur-sm rounded-full border border-white/20 transition-all hover:scale-105"
      >
        View Work
      </a>

      <a
        href="https://drive.google.com/file/d/1DqUPXLbAgGpvE7GhPuKxgMVgt6M20nWE/view?usp=sharing"
        target="_blank"
        rel="noopener noreferrer"
        class="px-8 py-3 border border-white/30 rounded-full bg-transparent flex items-center gap-2 hover:bg-white/10 transition-all hover:scale-105"
      >
        <span>Resume</span>
        <i class="fa-solid fa-download"></i>
      </a>
    </div>

    <div class="flex justify-center gap-6 mt-6">
      <a
        href="https://github.com/AvinashS1995"
        target="_blank"
        rel="noopener noreferrer"
        class="w-12 h-12 rounded-full bg-white/10 hover:bg-orange-500 flex items-center justify-center transition-all border border-white/20"
      >
        <i class="fa-brands fa-github text-lg"></i>
      </a>
      <a
        href="https://www.linkedin.com/in/avinash-suryawanshi-8a68182b8/"
        target="_blank"
        rel="noopener noreferrer"
        class="w-12 h-12 rounded-full bg-white/10 hover:bg-orange-500 flex items-center justify-center transition-all border border-white/20"
      >
        <i class="fa-brands fa-linkedin text-lg"></i>
      </a>
      <a
        href="#contact"
        class="w-12 h-12 rounded-full bg-white/10 hover:bg-orange-500 flex items-center justify-center transition-all border border-white/20"
      >
        <i class="fa-solid fa-envelope text-lg"></i>
      </a>
    </div>
  </div>

  <button
    type="button"
    (click)="scrollToNext()"
    class="absolute bottom-8 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 text-white/60 hover:text-white transition-colors"
  >
    <span class="text-sm">Scroll Down</span>
    <i class="fa-solid fa-chevron-down text-2xl"></i>
  </button>
</section>
