<section id="education" class="py-20 px-4 bg-slate-50">
  <div class="container mx-auto max-w-4xl">
    <div class="text-center mb-16">
      <h2 class="text-4xl md:text-5xl mb-4 font-bold">Education</h2>
      <div class="w-20 h-1 bg-orange-500 mx-auto"></div>
    </div>

    <div class="relative">
      <div class="absolute left-6 top-0 bottom-0 w-px bg-orange-200"></div>
      <div class="space-y-12">
        <div *ngFor="let education of data" class="relative pl-16">
          <div
            class="absolute left-0 top-0 w-12 h-12 rounded-full bg-orange-500 flex items-center justify-center shadow-lg border-4 border-white"
          >
            <i class="fa-solid fa-graduation-cap text-white"></i>
          </div>

          <div class="bg-white rounded-xl p-6 hover:shadow-lg transition-all hover:scale-[1.02]">
            <div class="flex flex-wrap justify-between items-start gap-4 mb-4">
              <div>
                <h3 class="text-xl mb-2 font-semibold">{{ education.degree }}</h3>
                <p class="text-orange-500 font-medium">{{ education.university }}</p>
              </div>
              <div class="flex items-center gap-2 px-4 py-2 bg-orange-100 rounded-full text-sm">
                <span class="font-medium">{{ education.fromYear }}</span>
                <span>-</span>
                <span class="font-medium">{{ education.currentlyStudying ? 'Present' : education.toYear }}</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
