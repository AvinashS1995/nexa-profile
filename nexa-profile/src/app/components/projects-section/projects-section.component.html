<section id="projects" class="py-20 px-4 bg-white">
  <div class="container mx-auto max-w-6xl">
    <div class="text-center mb-16">
      <h2 class="text-4xl md:text-5xl mb-4 font-bold">Featured Projects</h2>
      <div class="w-20 h-1 bg-orange-500 mx-auto"></div>
    </div>

    <div class="grid md:grid-cols-2 gap-8">
      <div
        *ngFor="let project of data"
        class="bg-slate-50 rounded-xl overflow-hidden hover:shadow-xl transition-all group hover:scale-[1.02]"
      >
        <div class="h-48 bg-gradient-to-br from-orange-400 to-orange-600 flex items-center justify-center relative overflow-hidden">
          <div class="absolute inset-0 bg-black/20 group-hover:bg-black/10 transition-colors"></div>
          <div class="relative z-10 text-white text-center p-6">
            <h3 class="text-2xl mb-2 font-semibold">{{ project.title }}</h3>
            <p class="text-sm opacity-90">{{ project.category }}</p>
          </div>
        </div>

        <div class="p-6">
          <p class="text-slate-600 mb-4 leading-relaxed">{{ project.description }}</p>

          <div *ngIf="getTechStack(project).length" class="mb-6">
            <span class="text-sm text-slate-500 mb-2 block">Technologies Used:</span>
            <div class="flex flex-wrap gap-2">
              <span
                *ngFor="let tech of getTechStack(project)"
                class="px-3 py-1 bg-white border border-orange-200 rounded-full text-xs text-slate-700 hover:bg-orange-50 transition-colors"
              >
                {{ tech }}
              </span>
            </div>
          </div>

          <div class="flex gap-3">
            <a
              *ngIf="project.previewLink"
              href="{{ project.previewLink }}"
              target="_blank"
              rel="noopener noreferrer"
              class="flex-1"
            >
              <button
                type="button"
                class="w-full px-4 py-3 bg-orange-500 hover:bg-orange-600 text-white rounded-full transition-all flex items-center justify-center gap-2"
              >
                <i class="fa-solid fa-arrow-up-right-from-square"></i>
                Live Demo
              </button>
            </a>

            <a
              *ngIf="project.codeLink"
              href="{{ project.codeLink }}"
              target="_blank"
              rel="noopener noreferrer"
              class="flex-1"
            >
              <button
                type="button"
                class="w-full px-4 py-3 rounded-full border border-orange-500 text-orange-600 bg-white hover:bg-orange-50 transition-all flex items-center justify-center gap-2"
              >
                <i class="fa-brands fa-github"></i>
                Code
              </button>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
