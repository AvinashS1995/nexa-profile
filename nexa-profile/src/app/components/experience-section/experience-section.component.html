<section id="experience" class="py-20 px-4 bg-white">
  <div class="container mx-auto max-w-4xl">
    <div class="text-center mb-16">
      <h2 class="text-4xl md:text-5xl mb-4 font-bold">Work Experience</h2>
      <div class="w-20 h-1 bg-orange-500 mx-auto"></div>
    </div>

    <div class="relative">
      <div class="absolute left-6 top-0 bottom-0 w-px bg-orange-200"></div>
      <div class="space-y-12">
        <div *ngFor="let experience of data; let i = index" class="relative pl-16">
          <div
            class="absolute left-0 top-0 w-12 h-12 rounded-full bg-orange-500 flex items-center justify-center shadow-lg border-4 border-white"
          >
            <i class="fa-solid fa-briefcase text-white"></i>
          </div>

          <div class="bg-slate-50 rounded-xl p-6 hover:shadow-lg transition-all hover:scale-[1.02]">
            <div class="flex flex-wrap justify-between items-start gap-4 mb-4">
              <div>
                <h3 class="text-xl mb-1 font-semibold">{{ experience.role }}</h3>
                <p class="text-orange-500 font-medium">{{ experience.company }}</p>
              </div>
              <div class="flex items-center gap-2 px-4 py-2 bg-orange-100 rounded-full text-sm">
                <span class="font-medium">{{ experience.fromYear }}</span>
                <span>-</span>
                <span class="font-medium">{{ experience.currentlyWorking ? 'Present' : experience.toYear }}</span>
              </div>
            </div>

            <p *ngIf="experience.project" class="text-sm mb-3 bg-white px-3 py-2 rounded-lg inline-block">
              <span class="text-slate-600">Project: </span>
              <span class="font-medium text-slate-900">{{ experience.project }}</span>
            </p>

            <p class="text-slate-600 leading-relaxed mb-4">{{ experience.description }}</p>

            <div *ngIf="experience.techStack?.length" class="mt-4 pt-4 border-t border-slate-200">
              <p class="text-sm text-slate-500 mb-2">Tech Stack:</p>
              <div class="flex flex-wrap gap-2">
                <span
                  *ngFor="let tech of experience.techStack"
                  class="px-3 py-1 bg-white border border-orange-200 rounded-full text-xs text-slate-700 hover:bg-orange-50 transition-colors"
                >
                  {{ tech }}
                </span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
